stories:
- story: schedule meeting with direct time test
  steps:
  - user: |
      hi
    intent: greet
  - action: utter_greet
  - user: |
      I want to schedule a meeting
    intent: schedule_meeting
  - action: meeting_form
  - active_loop: meeting_form
  - slot_was_set:
      - requested_slot: meeting_title
  - user: |
      Project planning
    intent: inform
  - action: meeting_form
  - active_loop: meeting_form
  - slot_was_set:
      - meeting_title: Project planning
      - requested_slot: participants
  - user: |
      Anna and Tom
    intent: inform
  - action: meeting_form
  - active_loop: meeting_form
  - slot_was_set:
      - participants: Anna and Tom
      - requested_slot: duration
  - user: |
      45 minutes
    intent: inform
  - action: meeting_form
  - active_loop: meeting_form
  - slot_was_set:
      - duration: 45 minutes
      - requested_slot: preferred_time
  - user: |
      tomorrow at 3 pm
    intent: provide_time
  - action: meeting_form
  - active_loop: null
  - slot_was_set:
      - preferred_time: tomorrow at 3 pm
      - requested_slot: null
  - action: action_suggest_meeting_slots
  - action: action_prepare_confirmation_summary
  - user: |
      confirm
    intent: confirm
  - action: action_create_meeting_summary

- story: standalone calendar query test
  steps:
  - user: |
      what do I have tomorrow?
    intent: ask_calendar_events
  - action: calendar_query_form
  - active_loop: calendar_query_form
  - active_loop: null
  - action: action_show_calendar_events
