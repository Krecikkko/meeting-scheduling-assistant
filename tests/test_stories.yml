  - action: change_meeting_field_form
  - active_loop: change_meeting_field_form
  - active_loop: null
  - slot_was_set:
      - requested_change_field: null
      - changed_field_value: null
  - action: action_apply_meeting_change
  - action: action_suggest_meeting_slots
  - action: action_prepare_confirmation_summary
  - user: |
      confirm
    intent: confirm
  - action: action_create_meeting_summary

- story: cancel scheduling test
  steps:
  - user: |
      I want to schedule a meeting
    intent: schedule_meeting
  - action: meeting_form
  - active_loop: meeting_form
  - slot_was_set:
      - requested_slot: meeting_title
  - user: |
      Cancel this meeting
    intent: cancel
  - action: action_clear_meeting_slots
  - slot_was_set:
      - meeting_title: null
      - participants: null
      - duration: null
      - preferred_time: null
      - preferred_time_iso: null
      - calculated_end_time_iso: null
      - location: null
      - meeting_description: null
      - awaiting_meeting_confirmation: null
  - action: action_deactivate_loop
  - active_loop: null
  - action: utter_cancelled
