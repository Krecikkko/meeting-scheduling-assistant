version: "3.1"

rules:
  - rule: Say hello
    steps:
      - intent: greet
      - action: utter_greet

  - rule: Say goodbye
    steps:
      - intent: goodbye
      - action: utter_goodbye

  - rule: Activate meeting form
    steps:
      - intent: schedule_meeting
      - action: meeting_form
      - active_loop: meeting_form

  - rule: Submit meeting form
    condition:
      - active_loop: meeting_form
    steps:
      - action: meeting_form
      - active_loop: null
      - action: action_suggest_meeting_slots
      - action: action_prepare_confirmation_summary

  - rule: Confirm proposed meeting
    steps:
      - action: action_prepare_confirmation_summary
      - intent: confirm
      - action: action_create_meeting_summary

  - rule: Reject proposed meeting
    steps:
      - action: action_prepare_confirmation_summary
      - intent: deny
      - action: action_clear_meeting_slots
      - action: utter_cancelled

  - rule: Cancel scheduling
    steps:
      - intent: cancel
      - action: action_clear_meeting_slots
      - action: action_deactivate_loop
      - active_loop: null
      - action: utter_cancelled

  - rule: Explain help
    steps:
      - intent: ask_help
      - action: utter_help

  - rule: Answer bot challenge
    steps:
      - intent: bot_challenge
      - action: utter_iamabot

  - rule: Handle fallback
    steps:
      - intent: nlu_fallback
      - action: utter_default

  # Calendar Query Rules
  - rule: Activate calendar query form
    steps:
      - intent: ask_calendar_events
      - action: calendar_query_form
      - active_loop: calendar_query_form

  - rule: Submit calendar query form
    condition:
      - active_loop: calendar_query_form
    steps:
      - action: calendar_query_form
      - active_loop: null
      - action: action_show_calendar_events

  # Meeting Form Interruption Rule
  - rule: Interrupted meeting form with calendar query
    condition:
      - active_loop: meeting_form
    steps:
      - intent: ask_calendar_events
      - action: action_show_calendar_events
      - action: meeting_form
      - active_loop: meeting_form

  # Change Field Rules
  - rule: Activate change field form
    steps:
      - intent: change_meeting_field
      - action: action_set_requested_change_field
      - action: change_meeting_field_form
      - active_loop: change_meeting_field_form

  - rule: Submit change field form
    condition:
      - active_loop: change_meeting_field_form
    steps:
      - action: change_meeting_field_form
      - active_loop: null
      - action: action_apply_meeting_change
      - action: action_suggest_meeting_slots
      - action: action_prepare_confirmation_summary

  # Change Field Form Interruption Rule
  - rule: Interrupted change field form with calendar query
    condition:
      - active_loop: change_meeting_field_form
    steps:
      - intent: ask_calendar_events
      - action: action_show_calendar_events
      - action: change_meeting_field_form
      - active_loop: change_meeting_field_form