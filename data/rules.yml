version: "3.1"

rules:
  - rule: Say hello
    steps:
      - intent: greet
      - action: utter_greet

  - rule: Say goodbye
    steps:
      - intent: goodbye
      - action: utter_goodbye

  - rule: Activate meeting form
    steps:
      - intent: schedule_meeting
      - action: meeting_form
      - active_loop: meeting_form

  - rule: Submit meeting form
    condition:
      - active_loop: meeting_form
    steps:
      - action: meeting_form
      - active_loop: null
      - action: action_suggest_meeting_slots
      - action: utter_confirm_meeting

  - rule: Confirm proposed meeting
    steps:
      - action: utter_confirm_meeting
      - intent: confirm
      - action: action_create_meeting_summary

  - rule: Reject proposed meeting
    steps:
      - action: utter_confirm_meeting
      - intent: deny
      - action: action_clear_meeting_slots
      - action: utter_cancelled

  - rule: Cancel scheduling
    steps:
      - intent: cancel
      - action: action_deactivate_loop
      - active_loop: null
      - action: utter_cancelled

  - rule: Explain help
    steps:
      - intent: ask_help
      - action: utter_help

  - rule: Answer bot challenge
    steps:
      - intent: bot_challenge
      - action: utter_iamabot

  - rule: Handle fallback
    steps:
      - intent: nlu_fallback
      - action: utter_default